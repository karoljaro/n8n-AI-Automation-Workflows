name: n8n

services:
  postgres:
    image: "postgres:${POSTGRES_VERSION:-18}-${POSTGRES_VARIANT:-bookworm}"
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-n8n}"
      POSTGRES_USER: "${POSTGRES_USER:-n8n}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"'
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - database

  n8n:
    image: "docker.n8n.io/n8nio/n8n:${N8N_VERSION:-2.26.8}"
    restart: unless-stopped
    environment:
      NODE_ENV: production

      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: "${POSTGRES_DB:-n8n}"
      DB_POSTGRESDB_USER: "${POSTGRES_USER:-n8n}"
      DB_POSTGRESDB_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}"
      DB_POSTGRESDB_SCHEMA: public

      N8N_ENCRYPTION_KEY: "${N8N_ENCRYPTION_KEY:?Set N8N_ENCRYPTION_KEY in .env}"
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_GRACEFUL_SHUTDOWN_TIMEOUT: "30"

      N8N_RUNNERS_ENABLED: "true"
      N8N_RUNNERS_MODE: external
      N8N_RUNNERS_AUTH_TOKEN: "${N8N_RUNNERS_AUTH_TOKEN:?Set N8N_RUNNERS_AUTH_TOKEN in .env}"
      N8N_RUNNERS_BROKER_LISTEN_ADDRESS: "0.0.0.0"
      N8N_NATIVE_PYTHON_RUNNER: "true"

      N8N_HOST: "${N8N_HOST:-localhost}"
      N8N_PORT: "5678"
      N8N_PROTOCOL: "${N8N_PROTOCOL:-http}"
      N8N_EDITOR_BASE_URL: "${N8N_PUBLIC_URL:-http://localhost:5678}"
      WEBHOOK_URL: "${N8N_PUBLIC_URL:-http://localhost:5678}/"
      N8N_PROXY_HOPS: "${N8N_PROXY_HOPS:-0}"

      GENERIC_TIMEZONE: "${GENERIC_TIMEZONE:-Europe/Warsaw}"
      TZ: "${GENERIC_TIMEZONE:-Europe/Warsaw}"

    ports:
      - "${N8N_BIND_ADDRESS:-127.0.0.1}:${N8N_PORT:-5678}:5678"

    volumes:
      - n8n_data:/home/node/.n8n

    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          fetch('http://127.0.0.1:5678/healthz/readiness')
          .then((response) => process.exit(response.ok ? 0 : 1))
          .catch(() => process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

    stop_grace_period: 45s

    networks:
      - app
      - database

  task-runners:
    image: "n8nio/runners:${N8N_VERSION:-2.26.8}"
    restart: unless-stopped
    environment:
      N8N_RUNNERS_TASK_BROKER_URI: "http://n8n:5679"
      N8N_RUNNERS_AUTH_TOKEN: "${N8N_RUNNERS_AUTH_TOKEN:?Set N8N_RUNNERS_AUTH_TOKEN in .env}"
      N8N_RUNNERS_AUTO_SHUTDOWN_TIMEOUT: "15"

    depends_on:
      n8n:
        condition: service_healthy

    stop_grace_period: 30s

    networks:
      - app

volumes:
  postgres_data:
  n8n_data:

networks:
  app:
  database:
    internal: true
